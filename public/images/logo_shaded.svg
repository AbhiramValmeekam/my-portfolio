<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Soft Drop Shadow for Depth -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <!-- Shading Gradients for Soothing Tech Look (Soft Slate to Charcoal) -->
    <linearGradient id="grad-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="50%" stop-color="#374151" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
    
    <linearGradient id="grad-v" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9CA3AF" />
      <stop offset="50%" stop-color="#6B7280" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>

    <!-- Warm Soothing Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FAF9F6" />
      <stop offset="100%" stop-color="#F3F2EE" />
    </radialGradient>
  </defs>

  <!-- Background Circle (Soothing Notion Cream) -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="#E5E4E0" stroke-width="4" />

  <!-- Interlocking AV Monogram with Shading and Depth -->
  <g filter="url(#drop-shadow)">
    <!-- The "V" Shape (Behind the A on left, overlaps on right for interlocking effect) -->
    <path d="M 150 170 L 256 380 L 362 170 L 312 170 L 256 290 L 200 170 Z" fill="url(#grad-v)" />
    
    <!-- The "A" Shape (Overlaps V, with horizontal crossbar) -->
    <path d="M 256 130 L 120 380 L 170 380 L 256 210 L 342 380 L 392 380 Z" fill="url(#grad-a)" />
    
    <!-- Crossbar of the "A" interlocking through the V -->
    <path d="M 190 310 L 322 310 L 310 335 L 202 335 Z" fill="url(#grad-a)" />
  </g>
</svg>
